<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Our 10th Month Anniversary ❤️</title>
  </head>
  <body>
    <script>
      window.addEventListener('error', function(event) {
        var div = document.getElementById('error-overlay');
        if (!div) {
          div = document.createElement('div');
          div.id = 'error-overlay';
          div.style.position = 'fixed';
          div.style.top = '0';
          div.style.left = '0';
          div.style.width = '100%';
          div.style.height = '100%';
          div.style.backgroundColor = 'rgba(255, 192, 203, 0.95)';
          div.style.color = '#4A1525';
          div.style.padding = '30px';
          div.style.zIndex = '999999';
          div.style.fontFamily = 'monospace';
          div.style.overflow = 'auto';
          document.body.appendChild(div);
        }
        div.innerHTML = '<h1>Runtime Error Diagnostic:</h1>' +
          '<p><strong>Message:</strong> ' + event.message + '</p>' +
          '<p><strong>Source:</strong> ' + event.filename + ':' + event.lineno + ':' + event.colno + '</p>' +
          '<pre style="background: rgba(255,255,255,0.5); padding: 15px; border-radius: 10px; margin-top: 20px; white-space: pre-wrap;">' + 
          (event.error ? event.error.stack : 'No stack trace available') + '</pre>';
      });
      window.addEventListener('unhandledrejection', function(event) {
        var div = document.getElementById('error-overlay');
        if (!div) {
          div = document.createElement('div');
          div.id = 'error-overlay';
          div.style.position = 'fixed';
          div.style.top = '0';
          div.style.left = '0';
          div.style.width = '100%';
          div.style.height = '100%';
          div.style.backgroundColor = 'rgba(255, 192, 203, 0.95)';
          div.style.color = '#4A1525';
          div.style.padding = '30px';
          div.style.zIndex = '999999';
          div.style.fontFamily = 'monospace';
          div.style.overflow = 'auto';
          document.body.appendChild(div);
        }
        div.innerHTML = '<h1>Unhandled Promise Rejection:</h1>' +
          '<p><strong>Reason:</strong> ' + (event.reason ? (event.reason.message || event.reason) : 'Unknown') + '</p>';
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
